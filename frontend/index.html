<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Doctor Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Serif+4:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <div class="badge">Local RAG Assistant</div>
        <h1>Doctor Assistant</h1>
        <p>
          Ask about doctor notes, meds, labs, nursing vitals, and imaging from the
          local sample data.
        </p>
      </section>

      <section class="chat">
        <div id="chatLog" class="chat-log"></div>
        <form id="chatForm" class="chat-form">
          <label class="field">
            <span>Question</span>
            <textarea
              id="questionInput"
              rows="3"
              placeholder="e.g., What were the latest chest X-ray findings for patient an1?"
              required
            ></textarea>
          </label>
          <button type="submit">Send</button>
        </form>
      </section>

      <section class="disclaimer">
        <h2>Disclaimer</h2>
        <p>
          This chatbot provides informational support from local records and is
          not a substitute for professional medical judgment, diagnosis, or
          treatment.
        </p>
      </section>
    </main>

    <script src="/assets/app.js"></script>
  </body>
</html>
